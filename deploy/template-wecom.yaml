  HandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-handler
      Runtime: python3.12
      Handler: index.lambda_handler
      Code:
        ZipFile: |
          import json, os, hashlib, time, boto3
          import xml.etree.ElementTree as ET
          lambda_client = boto3.client("lambda")
          sm_client = boto3.client("secretsmanager")
          ddb = boto3.resource("dynamodb")
          WORKER_FN = os.environ.get("WORKER_FUNCTION_NAME", "")
          SECRET_ARN = os.environ.get("SECRET_ARN", "")
          DEDUP_TABLE = os.environ.get("DEDUP_TABLE_NAME", "")
          _secret = None
          def get_secret():
              global _secret
              if not _secret:
                  r = sm_client.get_secret_value(SecretId=SECRET_ARN)
                  _secret = json.loads(r["SecretString"])
              return _secret
          def verify_sig(token, ts, nonce, data):
              s = "".join(sorted([token, ts, nonce, data]))
              return hashlib.sha1(s.encode()).hexdigest()
          def lambda_handler(event, context):
              sec = get_secret()
              token = sec["TOKEN"]
              method = event.get("httpMethod", "GET")
              params = event.get("queryStringParameters") or {}
              sig = params.get("msg_signature", "")
              ts = params.get("timestamp", "")
              nonce = params.get("nonce", "")
              if method == "GET":
                  echostr = params.get("echostr", "")
                  if verify_sig(token, ts, nonce, echostr) != sig:
                      return {"statusCode": 403, "body": "bad sig"}
                  # Pass to worker for decrypt and return
                  # For URL verification, we need sync response
                  # So we decrypt here using openssl subprocess
                  import subprocess, base64, struct
                  aes_key = base64.b64decode(sec["ENCODING_AES_KEY"] + "=")
                  iv = aes_key[:16]
                  enc_bytes = base64.b64decode(echostr)
                  proc = subprocess.run(
                      ["openssl", "enc", "-aes-256-cbc", "-d", "-nopad",
                       "-K", aes_key.hex(), "-iv", iv.hex()],
                      input=enc_bytes, capture_output=True)
                  if proc.returncode != 0:
                      return {"statusCode": 500, "body": "decrypt fail"}
                  dec = proc.stdout
                  pad = dec[-1]
                  dec = dec[:-pad]
                  msg_len = struct.unpack(">I", dec[16:20])[0]
                  echo_plain = dec[20:20+msg_len].decode("utf-8")
                  return {"statusCode": 200, "headers": {"Content-Type": "text/plain"}, "body": echo_plain}
              # POST: message callback
              body = event.get("body", "")
              try:
                  xml = ET.fromstring(body)
                  encrypt_data = xml.find("Encrypt").text
              except:
                  return {"statusCode": 400, "body": "bad xml"}
              if verify_sig(token, ts, nonce, encrypt_data) != sig:
                  return {"statusCode": 403, "body": "bad sig"}
              # Dedup check
              msg_id = ""
              try:
                  import subprocess, base64, struct
                  aes_key = base64.b64decode(sec["ENCODING_AES_KEY"] + "=")
                  iv = aes_key[:16]
                  enc_bytes = base64.b64decode(encrypt_data)
                  proc = subprocess.run(
                      ["openssl", "enc", "-aes-256-cbc", "-d", "-nopad",
                       "-K", aes_key.hex(), "-iv", iv.hex()],
                      input=enc_bytes, capture_output=True)
                  dec = proc.stdout
                  pad = dec[-1]
                  dec = dec[:-pad]
                  msg_len = struct.unpack(">I", dec[16:20])[0]
                  msg_xml = dec[20:20+msg_len].decode("utf-8")
                  msg_tree = ET.fromstring(msg_xml)
                  msg_type = msg_tree.find("MsgType").text
                  if msg_type != "text":
                      return {"statusCode": 200, "body": "ok"}
                  content = msg_tree.find("Content").text or ""
                  from_user = msg_tree.find("FromUserName").text or ""
                  mid = msg_tree.find("MsgId")
                  msg_id = mid.text if mid is not None else ""
                  chat_node = msg_tree.find("ChatId")
                  is_group = chat_node is not None
                  chat_id = chat_node.text if is_group else ""
                  if is_group:
                      import re
                      content = re.sub(r"@[\w\u4e00-\u9fff]+\s*", "", content).strip()
                  if not content.strip():
                      return {"statusCode": 200, "body": "ok"}
              except Exception as e:
                  return {"statusCode": 200, "body": str(e)}
              # Dedup
              if msg_id and DEDUP_TABLE:
                  tbl = ddb.Table(DEDUP_TABLE)
                  try:
                      tbl.put_item(
                          Item={"msg_id": msg_id, "ttl": int(time.time())+300},
                          ConditionExpression="attribute_not_exists(msg_id)")
                  except:
                      return {"statusCode": 200, "body": "dup"}
              # Invoke worker async
              lambda_client.invoke(
                  FunctionName=WORKER_FN, InvocationType="Event",
                  Payload=json.dumps({"from_user": from_user, "content": content,
                      "is_group_chat": is_group, "chat_id": chat_id}).encode())
              return {"statusCode": 200, "body": "ok"}
      Role: !GetAtt HandlerFunctionRole.Arn
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          WORKER_FUNCTION_NAME: !Ref WorkerFunction
          SECRET_ARN: !Ref WeComCredentials
          DEDUP_TABLE_NAME: !Ref DeduplicationTable

  HandlerApiPermissionGet:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TechBotApi}/*/GET/chat

  HandlerApiPermissionPost:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TechBotApi}/*/POST/chat

  # =========================
  # Worker Lambda (calls AgentCore, sends WeCom message)
  # =========================
  WorkerFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-worker-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: InvokeAgentCore
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: bedrock-agentcore:InvokeAgentRuntime
                Resource:
                  - !GetAtt AgentCoreRuntime.AgentRuntimeArn
                  - !Sub ${AgentCoreRuntime.AgentRuntimeArn}/runtime-endpoint/*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref WeComCredentials

  WorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-worker
      Runtime: python3.12
      Handler: index.lambda_handler
      Code:
        ZipFile: |
          """
          WeCom Worker Lambda
          
          Receives message from Handler, calls AgentCore Runtime for AI response,
          then sends the reply back to the user via WeCom API.
          """
          import json, os, time, boto3, urllib.request, urllib.parse

          sm_client = boto3.client("secretsmanager")
          # AgentCore client created inside invoke_agent function

          SECRET_ARN = os.environ.get("SECRET_ARN", "")
          AGENT_RUNTIME_ARN = os.environ.get("AGENT_RUNTIME_ARN", "")
          AGENTCORE_REGION = os.environ.get("AGENTCORE_REGION", "us-west-2")

          _cached_secret = None
          _access_token = None
          _token_expires = 0

          def get_secret():
              global _cached_secret
              if not _cached_secret:
                  resp = sm_client.get_secret_value(SecretId=SECRET_ARN)
                  _cached_secret = json.loads(resp["SecretString"])
              return _cached_secret

          def get_access_token():
              """Get WeCom access_token (cached until expiry)"""
              global _access_token, _token_expires
              if _access_token and time.time() < _token_expires:
                  return _access_token
              secret = get_secret()
              corp_id = secret["CORP_ID"]
              corp_secret = secret["SECRET"]
              url = f"https://qyapi.weixin.qq.com/cgi-bin/gettoken?corpid={corp_id}&corpsecret={corp_secret}"
              req = urllib.request.Request(url)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode("utf-8"))
              if data.get("errcode") == 0:
                  _access_token = data["access_token"]
                  _token_expires = time.time() + data.get("expires_in", 7200) - 300
                  return _access_token
              else:
                  raise Exception(f"Failed to get access_token: {data}")

          def send_wecom_message(to_user, content, use_markdown=True):
              """Send WeCom message with Markdown support
              
              WeCom Markdown supported syntax:
              - Headings: # / ## / ### / #### / ##### / ######
              - Bold: **text**
              - Links: [text](url)
              - Inline code: `code`
              - Blockquote: > text
              - Font color: <font color="info">green</font>
                         <font color="comment">gray</font>
                         <font color="warning">orange-red</font>
              
              Note: WeCom Markdown does NOT support tables, images, or code blocks
              """
              secret = get_secret()
              agent_id = secret["AGENT_ID"]
              access_token = get_access_token()
              url = f"https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token={access_token}"
              
              # Convert to WeCom-compatible Markdown
              if use_markdown:
                  formatted = convert_to_wecom_markdown(content)
              else:
                  formatted = content
              
              # Markdown max 4096 bytes, smart split for long messages
              parts = split_markdown_content(formatted, 3800)
              
              for i, part in enumerate(parts):
                  if len(parts) > 1:
                      part = f"**({i+1}/{len(parts)})**\n\n{part}"
                  
                  if use_markdown:
                      payload = {
                          "touser": to_user,
                          "msgtype": "markdown",
                          "agentid": int(agent_id),
                          "markdown": {"content": part}
                      }
                  else:
                      payload = {
                          "touser": to_user,
                          "msgtype": "text",
                          "agentid": int(agent_id),
                          "text": {"content": part}
                      }
                  
                  data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                  req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
                  with urllib.request.urlopen(req) as response:
                      resp_data = json.loads(response.read().decode("utf-8"))
                  if resp_data.get("errcode") != 0:
                      print(f"Send message error: {resp_data}")
                      # Fallback to plain text if Markdown fails
                      if use_markdown:
                          send_wecom_message(to_user, content, use_markdown=False)
                          return

          def convert_to_wecom_markdown(text):
              """Convert standard Markdown to WeCom-compatible format"""
              import re
              
              # 1. Code blocks ``` -> blockquote + inline code
              def replace_code_block(match):
                  lang = match.group(1) or ""
                  code = match.group(2).strip()
                  lines = code.split("\n")
                  result = ""
                  if lang:
                      result = f"> <font color=\"comment\">[{lang}]</font>\n"
                  for line in lines:
                      result += f"> `{line}`\n"
                  return result
              text = re.sub(r'```(\w*)\n(.*?)```', replace_code_block, text, flags=re.DOTALL)
              
              # 2. Unordered list - / * -> bullet symbol
              text = re.sub(r'^[\-\*]\s+', '* ', text, flags=re.MULTILINE)
              
              # 3. Images ![alt](url) -> text link
              text = re.sub(r'!\[([^\]]*)\]\(([^)]+)\)', r'[[img] \1](\2)', text)
              
              # 4. Tables -> key-value pair format
              def replace_table(match):
                  table_text = match.group(0)
                  lines = [l.strip() for l in table_text.strip().split("\n") if l.strip()]
                  if len(lines) < 3:
                      return table_text
                  headers = [c.strip() for c in lines[0].split("|") if c.strip()]
                  result = ""
                  for line in lines[2:]:
                      cols = [c.strip() for c in line.split("|") if c.strip()]
                      pairs = []
                      for j, col in enumerate(cols):
                          if j < len(headers):
                              pairs.append(f"**{headers[j]}**: {col}")
                      result += " | ".join(pairs) + "\n"
                  return result
              text = re.sub(r'(\|[^\n]+\|\n\|[\-:| ]+\|\n(\|[^\n]+\|\n?)+)', replace_table, text)
              
              # 5. Highlight keywords (warning) in orange
              text = re.sub(r'\*\*(Warning|Alert|Warning|IMPORTANT|Important)\*\*',
                          r'<font color="warning">**\1**</font>', text)
              
              # 6. Success/done keywords in green
              text = re.sub(r'\*\*(Success|Done|Done|Success|Done)\*\*',
                          r'<font color="info">**\1**</font>', text)
              
              return text

          def split_markdown_content(content, max_bytes):
              """Smart split at paragraph boundaries to preserve Markdown"""
              if len(content.encode("utf-8")) <= max_bytes:
                  return [content]
              
              parts = []
              paragraphs = content.split("\n\n")
              current_part = ""
              
              for para in paragraphs:
                  test = current_part + ("\n\n" if current_part else "") + para
                  if len(test.encode("utf-8")) > max_bytes:
                      if current_part:
                          parts.append(current_part)
                      current_part = para
                  else:
                      current_part = test
              
              if current_part:
                  parts.append(current_part)
              
              return parts if parts else [content]

          def invoke_agent(user_id, user_message, chat_id=""):
              """Invoke AgentCore Runtime for AI response"""
              try:
                  client = boto3.client("bedrock-agentcore", region_name=AGENTCORE_REGION)
                  payload = {
                      "actor_id": user_id,
                      "session_id": f"{chat_id}_{user_id}" if chat_id else user_id,
                      "channel_id": chat_id or user_id,
                      "prompt": user_message,
                      "encoded_images": []
                  }
                  response = client.invoke_agent_runtime(
                      agentRuntimeArn=AGENT_RUNTIME_ARN,
                      payload=json.dumps(payload, ensure_ascii=False),
                  )
                  response_body = response["response"].read()
                  if isinstance(response_body, (bytes, bytearray)):
                      response_body = response_body.decode("utf-8", errors="replace")
                  response_data = json.loads(response_body)
                  return response_data.get("response", "Sorry, I cannot answer this question at the moment.")
              except Exception as e:
                  print(f"AgentCore invocation error: {str(e)}")
                  return f"AI service error: {str(e)}"

          def send_wecom_group_message(chat_id, content, use_markdown=True):
              """Send message to WeCom group chat via appchat API"""
              secret=[REDACTED_PASSWORD]
              access_token = get_access_token()
              url = f"https://qyapi.weixin.qq.com/cgi-bin/appchat/send?access_token={access_token}"
              
              # Convert to WeCom-compatible Markdown
              if use_markdown:
                  formatted = convert_to_wecom_markdown(content)
              else:
                  formatted = content
              
              # Smart split
              parts = split_markdown_content(formatted, 3800)
              
              for i, part in enumerate(parts):
                  if len(parts) > 1:
                      part = f"**({i+1}/{len(parts)})**\n\n{part}"
                  
                  if use_markdown:
                      payload = {
                          "chatid": chat_id,
                          "msgtype": "markdown",
                          "markdown": {"content": part}
                      }
                  else:
                      payload = {
                          "chatid": chat_id,
                          "msgtype": "text",
                          "text": {"content": part}
                      }
                  
                  data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                  req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"})
                  with urllib.request.urlopen(req) as response:
                      resp_data = json.loads(response.read().decode("utf-8"))
                  if resp_data.get("errcode") != 0:
                      print(f"Send group message error: {resp_data}")
                      if use_markdown:
                          send_wecom_group_message(chat_id, content, use_markdown=False)
                          return

          def lambda_handler(event, context):
              from_user = event.get("from_user", "")
              content = event.get("content", "")
              is_group_chat = event.get("is_group_chat", False)
              chat_id = event.get("chat_id", "")
              
              if not from_user or not content:
                  return {"statusCode": 200, "body": "no content"}
              
              # Use user_id as session_id, prefix with chat_id for group context isolation
              session_id = f"{chat_id}_{from_user}" if is_group_chat else from_user
              
              # Call AgentCore
              reply = invoke_agent(from_user, content, chat_id=chat_id if is_group_chat else "")
              
              # Send reply
              if is_group_chat and chat_id:
                  # Group chat: reply to group
                  send_wecom_group_message(chat_id, reply)
              else:
                  # Private chat: reply to user
                  send_wecom_message(from_user, reply)
              
              return {"statusCode": 200, "body": "ok"}
      Role: !GetAtt WorkerFunctionRole.Arn
      Timeout: 900
      MemorySize: 512
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:770693421928:layer:Klayers-p312-requests:19
      Environment:
        Variables:
          SECRET_ARN: !Ref WeComCredentials
          AGENT_RUNTIME_ARN: !GetAtt AgentCoreRuntime.AgentRuntimeArn
          AGENTCORE_REGION: !Ref AWS::Region

Outputs:
  MemoryId:
    Condition: CreateMemory
    Description: AgentCore Memory ID
    Value: !GetAtt AgentCoreMemory.MemoryId

  RuntimeArn:
    Description: AgentCore Runtime ARN
    Value: !GetAtt AgentCoreRuntime.AgentRuntimeArn

  GatewayId:
    Description: AgentCore Gateway ID
    Value: !GetAtt AgentCoreGateway.GatewayIdentifier

  GatewayUrl:
    Description: AgentCore Gateway MCP endpoint URL
    Value: !Sub
      - https://${GatewayId}.gateway.bedrock-agentcore.${AWS::Region}.amazonaws.com/mcp
      - GatewayId: !GetAtt AgentCoreGateway.GatewayIdentifier

  WeComCallbackUrl:
    Description: >
      企业微信回调URL - 粘贴到企业微信管理后台 → 应用管理 → 自建应用 → 接收消息 → 设置API接收 → URL
    Value: !Sub https://${TechBotApi}.execute-api.${AWS::Region}.amazonaws.com/prod/chat

  HandlerFunctionName:
    Value: !Ref HandlerFunction

  WorkerFunctionName:
